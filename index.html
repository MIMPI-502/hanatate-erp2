const dlCSV=(filename,cols,rows)=>{
  const header=cols.map(c=>c.l).join(",");
  const body=rows.map(r=>cols.map(c=>{const v=c.r?c.r(r):(r[c.k]??"");return `"${String(v).replace(/"/g,'""')}"`;}).join(",")).join("\n");
  const bom="\uFEFF";
  const csv=bom+header+"\n"+body;
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const a=document.createElement("a");
  if(isIOS){
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  } else {
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    a.href=URL.createObjectURL(blob);
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  }
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

const dlExcel=(filename,cols,rows,sheetName="データ")=>{
  const header=cols.map(c=>c.l);
  const body=rows.map(r=>cols.map(c=>r[c.k]??''));
  const ws=XLSX.utils.aoa_to_sheet([header,...body]);
  const colWidths=cols.map(c=>({wch:Math.max(c.l.length*2,10)}));
  ws['!cols']=colWidths;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  XLSX.writeFile(wb,filename);
};

const ListPage=({title,icon,cols,rows,form,setForm,fields,onSave,onDelete,stats,poolOpts})=>{
  const resolveField=f=>f.isPool?{...f,type:"select",opts:poolOpts||f.opts}:f;
  const [show,setShow]=useState(false);
  const [toast,setToast]=useState("");
  const t=(m,tp)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const save=async()=>{await onSave();setShow(false);t("✅ 保存しました");};
  return <div>
    <Toast m={toast}/>
    <SH title={`${icon} ${title}`} sub={stats} action={<Btn onClick={()=>setShow(true)}>＋ 新規登録</Btn>}/>
    <div className="card"><Tbl cols={cols} rows={rows} onDelete={onDelete}/></div>
    {show&&<Modal title={`${title}登録`} onClose={()=>setShow(false)}>
      {fields.map(f=>{const rf=resolveField(f);return <Fld key={rf.k} l={rf.l}>{rf.type==="select"?<Sel v={form[rf.k]||""} on={e=>setForm({...form,[rf.k]:e.target.value})}>{(rf.opts||[]).map(o=><option key={o} value={o}>{o}</option>)}</Sel>:rf.type==="textarea"?<Txa v={form[rf.k]||""} on={e=>setForm({...form,[rf.k]:e.target.value})}/>:<Inp type={rf.type||"text"} step={rf.step} v={form[rf.k]||""} on={e=>setForm({...form,[rf.k]:e.target.value})} ph={rf.ph}/>}</Fld>;})}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <Btn c="g" onClick={()=>setShow(false)}>キャンセル</Btn><Btn onClick={save}>保存</Btn>

    </Modal>}
  </div>;
};

      cols={[{k:"date",l:"日付"},{k:"pool_id",l:"池",r:pName},{k:"temp",l:"水温",r:v=>v+"℃"},{k:"ph",l:"pH"},{k:"do_level",l:"DO"},{k:"nh3",l:"NH3"},{k:"staff",l:"担当"}]}

      setForm={setFWater} fields={[{k:"date",l:"日付",type:"date"},{k:"pool_id",l:"池",isPool:true},{k:"temp",l:"水温(℃)",type:"number",step:"0.1"},{k:"ph",l:"pH",type:"number",step:"0.1"},{k:"do_level",l:"DO(mg/L)",type:"number",step:"0.1"},{k:"nh3",l:"NH3",type:"number",step:"0.01"},{k:"no2",l:"NO2",type:"number",step:"0.01"},{k:"salt",l:"塩分(%)",type:"number",step:"0.1"},{k:"exchange",l:"換水率(%)",type:"number"},{k:"staff",l:"担当者"}]}
      onSave={saveWater} onDelete={async(r)=>{const ok=await db.del("erp_water_quality",r.id);if(ok)setWater(p=>p.filter(x=>x.id!==r.id));return ok;}} poolOpts={pOpts} stats={<span style={{display:'flex',gap:8,alignItems:'center'}}><CSVBtn filename={`水質記録_${td()}.csv`} cols={[{k:'date',l:'日付'},{k:'pool_id',l:'池ID'},{k:'temp',l:'水温'},{k:'ph',l:'pH'},{k:'do_level',l:'DO'},{k:'nh3',l:'NH3'},{k:'no2',l:'NO2'},{k:'salt',l:'塩分'},{k:'exchange',l:'換水率'},{k:'staff',l:'担当'}]} rows={water}/><ExcelBtn filename={`鹿児島委託_水質記録_${td()}.xlsx`} cols={[{k:'date',l:'日付'},{k:'pool_id',l:'池ID'},{k:'temp',l:'水温'},{k:'ph',l:'pH'},{k:'do_level',l:'DO'},{k:'nh3',l:'NH3'},{k:'no2',l:'NO2'},{k:'salt',l:'塩分'},{k:'exchange',l:'換水率'},{k:'staff',l:'担当'}]} rows={water.filter(r=>r.pool_id&&r.pool_id.startsWith('K'))} sheet="鹿児島委託_水質記録"/></span>}/>,
    deaths:<ListPage title="死鰻管理" icon="📉"
      cols={[{k:"date",l:"日付"},{k:"pool_id",l:"池",r:pName},{k:"count",l:"死鰻数",r:v=><span style={{color:"#e74c3c",fontWeight:700}}>{fmt(v)}尾</span>},{k:"cause",l:"原因"},{k:"staff",l:"担当"}]}
      rows={deaths} form={fDeath}
      setForm={setFDeath} fields={[{k:"date",l:"日付",type:"date"},{k:"pool_id",l:"池",isPool:true},{k:"count",l:"死鰻数",type:"number"},{k:"cause",l:"原因",ph:"水質悪化・疾病 等"},{k:"staff",l:"担当者"}]}
      onSave={saveDeath} onDelete={async(r)=>{const ok=await db.del("erp_deaths",r.id);if(ok)setDeaths(p=>p.filter(x=>x.id!==r.id));return ok;}} poolOpts={pOpts} stats={<span style={{display:'flex',gap:8,alignItems:'center'}}><span>累計{fmt(deaths.reduce((s,d)=>s+(d.count||0),0))}尾</span><CSVBtn filename={`死鰻記録_${td()}.csv`} cols={[{k:'date',l:'日付'},{k:'pool_id',l:'池ID'},{k:'count',l:'死鰻数'},{k:'cause',l:'原因'},{k:'staff',l:'担当'}]} rows={deaths}/><ExcelBtn filename={`鹿児島委託_死鰻記録_${td()}.xlsx`} cols={[{k:'date',l:'日付'},{k:'pool_id',l:'池ID'},{k:'count',l:'死鰻数'},{k:'cause',l:'原因'},{k:'staff',l:'担当'}]} rows={deaths.filter(r=>r.pool_id&&r.pool_id.startsWith('K'))} sheet="鹿児島委託_死鰻記録"/></span>}/>,
    medicine:<ListPage title="薬品管理" icon="💊"
      cols={[{k:"use_date",l:"投薬日"},{k:"name",l:"薬品名"},{k:"pool_id",l:"池",r:pName},{k:"amount",l:"使用量"},{k:"purpose",l:"目的"},{k:"withdraw_days",l:"休薬日数",r:v=>v+"日"},{k:"clear_date",l:"休薬満了"},{k:"status",l:"状態",r:v=><Bdg c={v==="active"?"y":"g"}>{v==="active"?"投薬中":"完了"}</Bdg>}]}
      rows={medicines} form={fMed}
      setForm={setFMed} fields={[{k:"name",l:"薬品名",ph:"フラボマイシン"},{k:"pool_id",l:"池",isPool:true},{k:"use_date",l:"投薬日",type:"date"},{k:"amount",l:"使用量",ph:"50g"},{k:"purpose",l:"目的",ph:"腸炎治療"},{k:"withdraw_days",l:"休薬日数",type:"number"},{k:"staff",l:"担当者"}]}
      onSave={saveMed} onDelete={async(r)=>{const ok=await db.del("erp_medicines",r.id);if(ok)setMed(p=>p.filter(x=>x.id!==r.id));return ok;}} poolOpts={pOpts} stats={<span style={{display:'flex',gap:8,alignItems:'center'}}><span>投薬中{medicines.filter(m=>m.status==="active").length}件</span><CSVBtn filename={`薬品記録_${td()}.csv`} cols={[{k:'use_date',l:'投薬日'},{k:'name',l:'薬品名'},{k:'pool_id',l:'池ID'},{k:'amount',l:'使用量'},{k:'purpose',l:'目的'},{k:'withdraw_days',l:'休薬日数'},{k:'clear_date',l:'休薬満了'},{k:'status',l:'状態'}]} rows={medicines}/></span>}/>,
    processing:<ListPage title="加工管理" icon="🏭"
      cols={[{k:"date",l:"日付"},{k:"product",l:"製品"},{k:"raw_kg",l:"原料",r:v=>fmt(v)+"kg"},{k:"yield_kg",l:"歩留",r:v=>fmt(v)+"kg"},{k:"qty",l:"個数",r:v=>fmt(v)+"個"},{k:"staff",l:"担当"}]}
      rows={processing} form={fProc}
      setForm={setFProc} fields={[{k:"date",l:"加工日",type:"date"},{k:"product",l:"製品",type:"select",opts:["蒲焼き（1尾）","白焼き（1尾）","蒲焼き（カット）","その他"]},{k:"raw_kg",l:"原料(kg)",type:"number",step:"0.1"},{k:"yield_kg",l:"歩留(kg)",type:"number",step:"0.1"},{k:"qty",l:"個数",type:"number"},{k:"staff",l:"担当者"}]}
      onSave={saveProc} onDelete={async(r)=>{const ok=await db.del("erp_processing",r.id);if(ok)setProc(p=>p.filter(x=>x.id!==r.id));return ok;}} stats={<CSVBtn filename={`加工記録_${td()}.csv`} cols={[{k:'date',l:'日付'},{k:'product',l:'製品'},{k:'raw_kg',l:'原料kg'},{k:'yield_kg',l:'歩留kg'},{k:'qty',l:'個数'},{k:'staff',l:'担当'}]} rows={processing}/>}/>,
    haccp:<ListPage title="HACCP管理" icon="✅"
      cols={[{k:"date",l:"日付"},{k:"check_type",l:"点検種別"},{k:"result",l:"結果",r:v=><Bdg c={v==="合格"?"g":"r"}>{v}</Bdg>},{k:"staff",l:"担当"},{k:"memo",l:"メモ"}]}
      rows={haccp} form={fHaccp}
      setForm={setFHaccp} fields={[{k:"date",l:"日付",type:"date"},{k:"check_type",l:"点検種別",type:"select",opts:["入荷検品","温度管理","衛生点検","設備点検","加工工程","出荷検品","その他"]},{k:"result",l:"結果",type:"select",opts:["合格","要改善","不合格"]},{k:"staff",l:"担当者"},{k:"memo",l:"メモ",type:"textarea"}]}
      onSave={saveHaccp} onDelete={async(r)=>{const ok=await db.del("erp_haccp",r.id);if(ok)setHaccp(p=>p.filter(x=>x.id!==r.id));return ok;}} stats={<span style={{display:'flex',gap:8,alignItems:'center'}}><span>計{haccp.length}件</span><CSVBtn filename={`HACCP記録_${td()}.csv`} cols={[{k:'date',l:'日付'},{k:'check_type',l:'点検種別'},{k:'result',l:'結果'},{k:'staff',l:'担当'},{k:'memo',l:'メモ'}]} rows={haccp}/></span>}/>,
    permit:<div>
      <SH title="📋 許可枠管理"/>
      {permit.map(p=>{const pct=Math.round(p.used/p.annual*100);return(
        <div key={p.id}>
          <div className="gridStat">
            {[["許可番号",p.number,"#2ecc71"],["年度",p.year+"年度","#2ecc71"],["年間許可",fmt(p.annual)+"尾","#2ecc71"],["使用済",fmt(p.used)+"尾","#f0a500"],["残枠",fmt(p.annual-p.used)+"尾","#2ecc71"],["期限",fd(p.expiry),"#d4af37"]].map(([l,v,c])=>(
              <div className="stat" key={l}><div style={{fontSize:10,color:"#7aa885",marginBottom:4}}>{l}</div><div style={{fontSize:16,fontWeight:800,color:c}}>{v}</div></div>
            ))}
          </div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#7aa885"}}>許可枠使用率</span>
              <span style={{fontWeight:700,color:pct>80?"#f0a500":"#2ecc71"}}>{pct}%</span>
            </div>
            <div className="prog" style={{height:10,borderRadius:5}}>
              <div className="prog-bar" style={{height:10,borderRadius:5,width:`${Math.min(pct,100)}%`,background:pct>90?"#e74c3c":pct>70?"#f0a500":"#2ecc71"}}/>
            </div>
          </div>
        </div>
      );})}
    </div>,

    audit:<AuditPage pools={pools} deaths={deaths} medicines={medicines} shipping={shipping} water={water} haccp={haccp}/>,
  };

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
    <div style={{fontSize:40}}></div><div style={{color:"#7aa885",fontSize:14}}>花立山養鰻 ERP v2 起動中...</div>
  </div>;

  return <div>
    <div className="sidebar">
      <div style={{padding:"16px 14px 10px",borderBottom:"1px solid #1e3326"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><div style={{width:24,height:24,borderRadius:"50%",background:"#1a7a40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#fff",fontFamily:"serif",flexShrink:0}}>鰻</div><div style={{fontSize:10,color:"#2ecc71",fontWeight:800,letterSpacing:1}}>花立山養鰻</div></div>
        <div style={{fontSize:9,color:"#4a7055",marginTop:2}}>統合ERPシステム v2</div>
      </div>
      <nav style={{padding:"6px 0"}}>
        {NAV.map(([id,ic,lb])=>(
          <button key={id} className={`nav-btn${pg===id?" on":""}`} onClick={()=>setPg(id)}><span>{ic}</span>{lb}</button>
        ))}
      </nav>
    </div>
    <div className="main">{pages[pg]||pages.dashboard}</div>
    <div className="mnav">
      {NAV.map(([id,ic,lb])=>(
        <button key={id} className={pg===id?"on":""} onClick={()=>setPg(id)}><span style={{fontSize:16}}>{ic}</span><span>{lb.slice(0,4)}</span></button>
      ))}
    </div>
  </div>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
