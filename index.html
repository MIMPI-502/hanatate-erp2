 <!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>花立山養鰻 統合ERPシステム v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0f0d;color:#e8f5ec;font-family:'Helvetica Neue',Arial,sans-serif;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#111a15;} ::-webkit-scrollbar-thumb{background:#1e3326;border-radius:3px;}
input,select,textarea,button{font-family:inherit;}
.sidebar{width:190px;background:#111a15;border-right:1px solid #1e3326;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;}
.main{margin-left:190px;padding:24px 24px 80px;}
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#111a15;border-top:1px solid #1e3326;z-index:200;overflow-x:auto;padding:4px;}
.mnav button{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;background:none;border:none;color:#7aa885;font-size:9px;cursor:pointer;border-radius:6px;}
.mnav button.on{color:#2ecc71;background:rgba(46,204,113,0.1);}
@media(max-width:700px){.sidebar{display:none!important;}.main{margin-left:0!important;}.mnav{display:flex!important;}}
.card{background:#162019;border:1px solid #1e3326;border-radius:12px;padding:18px;}
.btn{padding:8px 16px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:none;}
.btn-p{background:#2ecc71;color:#0a0f0d;}
.btn-g{background:transparent;color:#7aa885;border:1px solid #1e3326;}
.btn-d{background:#e74c3c;color:#fff;}
.inp{width:100%;background:#162019;border:1px solid #1e3326;border-radius:8px;padding:8px 11px;color:#e8f5ec;font-size:13px;outline:none;}
.lbl{display:block;font-size:11px;color:#7aa885;margin-bottom:4px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.gridStat{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.gridPool{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#162019;border:1px solid #1e3326;border-radius:12px;padding:16px;}
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:8px 10px;text-align:left;color:#7aa885;font-size:10px;font-weight:700;border-bottom:2px solid #1e3326;white-space:nowrap;}
.tbl td{padding:9px 10px;border-bottom:1px solid #1e3326;white-space:nowrap;}
.badge{padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;}
.bg{background:#2ecc71;color:#0a0f0d;} .by{background:#f0a500;color:#0a0f0d;} .br{background:#e74c3c;color:#fff;} .bb{background:#3498db;color:#fff;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#111a15;border:1px solid #1e3326;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-w{max-width:660px;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:99px;font-weight:700;font-size:13px;z-index:2000;}
.fld{margin-bottom:12px;}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 14px;background:none;border:none;border-left:3px solid transparent;color:#7aa885;font-size:12px;cursor:pointer;text-align:left;}
.nav-btn.on{color:#2ecc71;background:rgba(46,204,113,.1);border-left-color:#2ecc71;font-weight:700;}
.prog{height:4px;background:#1e3326;border-radius:2px;margin-top:6px;}
.prog-bar{height:4px;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const SB_URL="https://xmzsszuteyuumspyzsaq.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0enNzenV0ZXl1dW1zcHl6c2FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUzOTM3MTYsImV4cCI6MjA2MDk2OTcxNn0.Jz3MmPuJZ0J7YqG0QzPzMfRMhQJCpTGJfCFe6bVa2IM";
const H={"Content-Type":"application/json",apikey:SB_KEY,Authorization:"Bearer "+SB_KEY};
const db={
  get:async(t)=>{const r=await fetch(`${SB_URL}/rest/v1/${t}?select=*&order=created_at.desc`,{headers:H});return r.ok?await r.json():[];},
  ins:async(t,d)=>{const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:"POST",headers:{...H,Prefer:"return=representation"},body:JSON.stringify(d)});return r.ok;},
};
const fmt=n=>n!=null?Number(n).toLocaleString():"—";
const td=()=>new Date().toISOString().slice(0,10);
const fd=d=>d?d.slice(0,10):"—";
const POOLS=[{id:"P01",name:"第1池",cap:10000,cur:8200,kg:820,st:"normal"},{id:"P02",name:"第2池",cap:10000,cur:7500,kg:750,st:"normal"},{id:"P03",name:"第3池",cap:8000,cur:6100,kg:610,st:"warning"},{id:"P04",name:"第4池",cap:10000,cur:7000,kg:700,st:"normal"},{id:"P05",name:"第5池",cap:10000,cur:6500,kg:650,st:"normal"},{id:"P06",name:"第6池",cap:8000,cur:5800,kg:580,st:"normal"},{id:"P07",name:"第7池",cap:8000,cur:4200,kg:420,st:"normal"},{id:"P08",name:"第8池",cap:5000,cur:4200,kg:420,st:"normal"},{id:"P09",name:"第9池",cap:5000,cur:3800,kg:380,st:"normal"},{id:"P10",name:"第10池",cap:12000,cur:9800,kg:980,st:"normal"},{id:"P11",name:"鹿児島委託池①",cap:10000,cur:0,kg:0,st:"normal"},{id:"P12",name:"鹿児島委託池②",cap:10000,cur:0,kg:0,st:"normal"},{id:"P13",name:"鹿児島委託池③",cap:10000,cur:0,kg:0,st:"normal"}];




const dlCSV=(filename,cols,rows)=>{
  const header=cols.map(c=>c.l).join(",");
  const body=rows.map(r=>cols.map(c=>{const v=r[c.k]??"";return `"${String(v).replace(/"/g,'""')}"`}).join(",")).join("\n");
  const bom="\uFEFF";
  const blob=new Blob([bom+header+"\n"+body],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
};
const CSVBtn=({filename,cols,rows})=>(
  <button onClick={()=>dlCSV(filename,cols,rows)} style={{padding:"7px 14px",background:"rgba(52,152,219,0.15)",border:"1px solid rgba(52,152,219,0.4)",borderRadius:8,color:"#3498db",fontSize:12,cursor:"pointer",fontWeight:700}}>📥 CSV</button>
);
const PoolEdit=({pool,setPools})=>{
  const [show,setShow]=useState(false);
  const [cur,setCur]=useState(pool.cur||pool.current||0);
  const [kg,setKg]=useState(pool.kg||pool.weight||0);
  const [cap,setCap]=useState(pool.cap||pool.capacity||0);
  const [saved,setSaved]=useState(false);
  const save=async()=>{
    setPools(prev=>prev.map(p=>p.id===pool.id?{...p,cur:Number(cur),kg:Number(kg),cap:Number(cap)}:p));
    await db.ins("erp_pools",{id:pool.id,name:pool.name,current:Number(cur),weight:Number(kg),capacity:Number(cap),status:pool.st||pool.status||"normal"});
    setShow(false);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  return <div style={{marginBottom:8}}>
    {saved&&<div style={{textAlign:"center",color:"#2ecc71",fontSize:11,marginBottom:4}}>✅ 更新しました</div>}
    {!show
      ?<button onClick={()=>setShow(true)} style={{width:"100%",padding:"4px",background:"rgba(46,204,113,0.08)",border:"1px solid rgba(46,204,113,0.2)",borderRadius:6,color:"#2ecc71",fontSize:11,cursor:"pointer"}}>✏️ 在鰻数・kg・容量を編集</button>
      :<div style={{background:"rgba(46,204,113,0.05)",border:"1px solid rgba(46,204,113,0.2)",borderRadius:8,padding:"10px"}}>
        <div style={{fontSize:11,color:"#7aa885",marginBottom:8,fontWeight:700}}>池データ編集</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
          <div><div style={{fontSize:10,color:"#7aa885",marginBottom:3}}>在鰻数(尾)</div>
            <input className="inp" type="number" value={cur} onChange={e=>setCur(e.target.value)} style={{padding:"5px 8px",fontSize:13,fontWeight:700}}/></div>
          <div><div style={{fontSize:10,color:"#7aa885",marginBottom:3}}>重量(kg)</div>
            <input className="inp" type="number" value={kg} onChange={e=>setKg(e.target.value)} style={{padding:"5px 8px",fontSize:13}}/></div>
          <div><div style={{fontSize:10,color:"#7aa885",marginBottom:3}}>容量(尾)</div>
            <input className="inp" type="number" value={cap} onChange={e=>setCap(e.target.value)} style={{padding:"5px 8px",fontSize:13}}/></div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={save} style={{flex:1,padding:"6px",background:"#2ecc71",border:"none",borderRadius:6,color:"#0a0f0d",fontSize:12,cursor:"pointer",fontWeight:700}}>保存する</button>
          <button onClick={()=>setShow(false)} style={{padding:"6px 10px",background:"none",border:"1px solid #1e3326",borderRadius:6,color:"#7aa885",fontSize:11,cursor:"pointer"}}>閉じる</button>
        </div>
      </div>
    }
  </div>;
};
const DeathInput=({poolId,poolName,deaths,setDeaths})=>{
  const [date,setDate]=useState(td());
  const [count,setCount]=useState("");
  const [cause,setCause]=useState("原因不明");
  const [show,setShow]=useState(false);
  const [saved,setSaved]=useState(false);
  const save=async()=>{
    if(!count)return;
    const row={date,pool_id:poolId,count:Number(count),cause,staff:"",memo:""};
    setDeaths(p=>[{...row,id:"D"+Date.now()},...p]);
    await db.ins("erp_deaths",row);
    setCount("");setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const todayCount=deaths.filter(d=>d.pool_id===poolId&&d.date===td()).reduce((s,d)=>s+(d.count||0),0);
  const monthCount=deaths.filter(d=>d.pool_id===poolId&&d.date&&d.date.slice(0,7)===td().slice(0,7)).reduce((s,d)=>s+(d.count||0),0);
  const totalCount=deaths.filter(d=>d.pool_id===poolId).reduce((s,d)=>s+(d.count||0),0);
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
      <span style={{color:"#e74c3c"}}>本日: <strong>{fmt(todayCount)}</strong>尾</span>
      <span style={{color:"#f0a500"}}>今月: <strong>{fmt(monthCount)}</strong>尾</span>
      <span style={{color:"#4a7055"}}>累計: {fmt(totalCount)}尾</span>
    </div>
    {saved&&<div style={{textAlign:"center",color:"#2ecc71",fontSize:11,marginBottom:4}}>✅ 記録しました</div>}
    {!show
      ?<button onClick={()=>setShow(true)} style={{width:"100%",padding:"5px",background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.3)",borderRadius:6,color:"#e74c3c",fontSize:11,cursor:"pointer",fontWeight:700}}>＋ 死鰻を記録する</button>
      :<div>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input className="inp" type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1,padding:"5px 8px",fontSize:12}}/>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <input className="inp" type="number" value={count} onChange={e=>setCount(e.target.value)} placeholder="死鰻数(尾)" style={{width:90,padding:"5px 8px",fontSize:12}}/>
          <select className="inp" value={cause} onChange={e=>setCause(e.target.value)} style={{flex:1,padding:"5px 8px",fontSize:11}}>
            <option>原因不明</option><option>水質悪化</option><option>疾病</option><option>酸欠</option><option>その他</option>
          </select>
        </div>
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <button onClick={save} style={{flex:1,padding:"6px",background:"#e74c3c",border:"none",borderRadius:6,color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>記録する</button>
          <button onClick={()=>setShow(false)} style={{padding:"6px 10px",background:"none",border:"1px solid #1e3326",borderRadius:6,color:"#7aa885",fontSize:11,cursor:"pointer"}}>閉じる</button>
        </div>
      </div>
    }
  </div>;
};
const Toast=({m,t="ok"})=>m?<div className="toast" style={{background:t==="ok"?"#2ecc71":"#e74c3c",color:"#0a0f0d"}}>{m}</div>:null;
const Btn=({c="p",onClick,children,sm})=><button className={`btn btn-${c}`} style={sm?{padding:"5px 11px",fontSize:11}:{}} onClick={onClick}>{children}</button>;
const Inp=({v,on,type="text",ph,step})=><input className="inp" type={type} value={v} onChange={on} placeholder={ph} step={step}/>;
const Sel=({v,on,children})=><select className="inp" value={v} onChange={on}>{children}</select>;
const Txa=({v,on,rows=3})=><textarea className="inp" value={v} onChange={on} rows={rows} style={{resize:"vertical"}}/>;
const Fld=({l,children})=><div className="fld"><label className="lbl">{l}</label>{children}</div>;
const Bdg=({c,children})=><span className={`badge b${c}`}>{children}</span>;
const Tbl=({cols,rows,empty="データなし"})=>(
  <div style={{overflowX:"auto"}}><table className="tbl"><thead><tr>{cols.map(c=><th key={c.k}>{c.l}</th>)}</tr></thead>
  <tbody>{rows.length===0?<tr><td colSpan={cols.length} style={{padding:20,textAlign:"center",color:"#4a7055"}}>{empty}</td></tr>:rows.map((r,i)=><tr key={i} style={{color:"#e8f5ec"}}>{cols.map(c=><td key={c.k}>{c.r?c.r(r[c.k],r):r[c.k]??"—"}</td>)}</tr>)}</tbody>
  </table></div>
);
const Modal=({title,onClose,children,wide})=>(
  <div className="modal-bg"><div className={`modal${wide?" modal-w":""}`}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <strong style={{fontSize:15}}>{title}</strong>
      <button onClick={onClose} style={{background:"none",border:"none",color:"#7aa885",fontSize:18,cursor:"pointer"}}>✕</button>
    </div>{children}
  </div></div>
);
const SH=({title,sub,action})=>(
  <div className="sec-h"><div><div style={{fontSize:16,fontWeight:800}}>{title}</div>{sub&&<div style={{fontSize:11,color:"#7aa885",marginTop:2}}>{sub}</div>}</div>{action}</div>
);

// ダッシュボード
const Dashboard=({pools,setPools,shipping,deaths,setDeaths,finance,setPage})=>{
  return <div>
    <SH title="ダッシュボード" sub={td()+" 現在"}/>
    <div className="gridStat">
      {[["","総在鰻",fmt(pools.reduce((s,p)=>s+(p.cur||p.current||0),0))+"尾","#2ecc71","stock"],
        ["🏊","管理池数",pools.length+"池","#2ecc71","stock"],
        ["📦","出荷件数",shipping.length+"件","#2ecc71","shipping"],

        ["⚠️","死鰻",fmt(deaths.reduce((s,d)=>s+(d.count||0),0))+"尾","#e74c3c","deaths"]
      ].map(([ic,lb,vl,cl,pg])=>(
        <div className="stat" key={lb} onClick={()=>setPage(pg)} style={{cursor:"pointer"}}>
          <div style={{fontSize:18,marginBottom:6}}>{ic}</div>
          <div style={{fontSize:22,fontWeight:800,color:cl,fontFamily:"monospace"}}>{vl}</div>
          <div style={{fontSize:11,color:"#7aa885",marginTop:3}}>{lb}</div>
        </div>
      ))}
    </div>
    <SH title="池別状況" action={<CSVBtn filename={`池別状況_${td()}.csv`} cols={[{k:"name",l:"池名"},{k:"cur",l:"在鰻数"},{k:"kg",l:"重量kg"},{k:"cap",l:"容量"},{k:"st",l:"状態"}]} rows={pools}/>}/>
    <div className="gridPool">
      {pools.map(p=>{const cur=p.cur||p.current||0;const cap=p.cap||p.capacity||1;const pct=Math.round(cur/cap*100);const warn=p.st==="warning"||p.status==="warning";return(
        <div className="card" key={p.id}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:13}}>{p.name}</span>
            <Bdg c={warn?"y":"g"}>{warn?"要注意":"正常"}</Bdg>
          </div>
          <div style={{fontSize:22,fontWeight:800,color:warn?"#f0a500":"#2ecc71",fontFamily:"monospace"}}>{fmt(cur)}<span style={{fontSize:11,color:"#7aa885"}}>尾</span></div>
          <div style={{fontSize:11,color:"#7aa885"}}>{fmt(p.kg||p.weight||0)}kg / 容量{fmt(cap)}尾</div>
          <div className="prog"><div className="prog-bar" style={{width:`${Math.min(pct,100)}%`,background:pct>90?"#e74c3c":warn?"#f0a500":"#2ecc71"}}/></div>
          <div style={{fontSize:10,color:"#4a7055",marginTop:3}}>{pct}%</div>
          <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1e3326"}}>
            <PoolEdit pool={p} setPools={setPools}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:11,color:"#e74c3c"}}>📉 今月死鰻: {fmt(deaths.filter(d=>d.pool_id===p.id&&d.date&&d.date.slice(0,7)===td().slice(0,7)).reduce((s,d)=>s+(d.count||0),0))}尾</span>
              <span style={{fontSize:10,color:"#4a7055"}}>累計: {fmt(deaths.filter(d=>d.pool_id===p.id).reduce((s,d)=>s+(d.count||0),0))}尾</span>
            </div>
            <DeathInput poolId={p.id} poolName={p.name} deaths={deaths} setDeaths={setDeaths}/>
          </div>
        </div>
      );})}
    </div>
  </div>;
};

// 汎用一覧ページ
const ListPage=({title,icon,cols,rows,form,setForm,fields,onSave,stats})=>{
  const [show,setShow]=useState(false);
  const [toast,setToast]=useState("");
  const t=(m,tp)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const save=async()=>{await onSave();setShow(false);t("✅ 保存しました");};
  return <div>
    <Toast m={toast}/>
    <SH title={`${icon} ${title}`} sub={stats} action={<Btn onClick={()=>setShow(true)}>＋ 新規登録</Btn>}/>
    <div className="card"><Tbl cols={cols} rows={rows}/></div>
    {show&&<Modal title={`${title}登録`} onClose={()=>setShow(false)}>
      {fields.map(f=><Fld key={f.k} l={f.l}>{f.type==="select"?<Sel v={form[f.k]||""} on={e=>setForm({...form,[f.k]:e.target.value})}>{f.opts.map(o=><option key={o} value={o}>{o}</option>)}</Sel>:f.type==="textarea"?<Txa v={form[f.k]||""} on={e=>setForm({...form,[f.k]:e.target.value})}/>:<Inp type={f.type||"text"} step={f.step} v={form[f.k]||""} on={e=>setForm({...form,[f.k]:e.target.value})} ph={f.ph}/>}</Fld>)}
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
        <Btn c="g" onClick={()=>setShow(false)}>キャンセル</Btn><Btn onClick={save}>保存</Btn>
      </div>
    </Modal>}
  </div>;
};

// 監査
const AuditPage=({pools,deaths,medicines,shipping,water,haccp})=>{
  const [mon,setMon]=useState(td().slice(0,7));
  const f=arr=>arr.filter(r=>(r.date||r.use_date||"").slice(0,7)===mon);
  const actMeds=medicines.filter(m=>m.status==="active");
  return <div>
    <SH title="🔍 監査対応" sub="行政・第三者監査向け集計"
      action={<input type="month" value={mon} onChange={e=>setMon(e.target.value)} className="inp" style={{width:"auto"}}/>}/>
    <div className="gridStat">
      {[["出荷",f(shipping).length,"#2ecc71"],["死鰻",f(deaths).length,"#e74c3c"],["水質",f(water).length,"#3498db"],["薬品",f(medicines).length,"#f0a500"],["HACCP",f(haccp).length,"#2ecc71"]].map(([l,v,c])=>(
        <div className="stat" key={l}><div style={{fontSize:11,color:"#7aa885",marginBottom:4}}>{l}記録</div><div style={{fontSize:22,fontWeight:800,color:c,fontFamily:"monospace"}}>{v}<span style={{fontSize:11}}>件</span></div></div>
      ))}
    </div>
    <div className="card" style={{marginBottom:16}}>
      <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>投薬中（出荷禁止）</div>
      {actMeds.length===0?<div style={{color:"#2ecc71",fontSize:13}}>✅ 投薬中なし（出荷可能）</div>:actMeds.map(m=>(
        <div key={m.id} style={{padding:"7px 0",borderBottom:"1px solid #1e3326",fontSize:12}}>⚠️ {m.name} — 休薬満了: {fd(m.clear_date)}</div>

    </div>

};

      setForm={()=>{}} fields={[{k:"date",l:"入荷日",type:"date"},{k:"supplier",l:"仕入先",ph:"福岡淡水株式会社"},{k:"pool_id",l:"池",type:"select",opts:["P01","P02","P03","P04","P05","P06","P07","P08","P09","P10","P11","P12","P13"]},{k:"lot",l:"ロット",ph:"L2026-001"},{k:"qty",l:"尾数",type:"number"},{k:"kg",l:"重量(kg)",type:"number"},{k:"staff",l:"担当者",ph:"昭次郎"}]}
      onSave={async()=>{}} stats={`計${stockIn.length}件`}/>,
    shipping:<ListPage title="出荷管理" icon="📦"

      rows={shipping} form={{date:td(),destination:"",pool_id:"P01",qty:"",kg:"",price:""}}

      onSave={async()=>{}} stats={<CSVBtn filename={`加工記録_${td()}.csv`} cols={[{k:'date',l:'日付'},{k:'product',l:'製品'},{k:'raw_kg',l:'原料kg'},{k:'yield_kg',l:'歩留kg'},{k:'qty',l:'個数'},{k:'staff',l:'担当'}]} rows={processing}/>}/>,

  };

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
    <div style={{fontSize:40}}></div><div style={{color:"#7aa885",fontSize:14}}>花立山養鰻 ERP v2 起動中...</div>

  return <div>
