// ============================================================
const SUPABASE_URL = typeof window !== 'undefined' && window.__SUPABASE_URL__ ? window.__SUPABASE_URL__ : 'https://xmzsszuteyuumspyzsaq.supabase.co';
const SUPABASE_ANON_KEY = typeof window !== 'undefined' && window.__SUPABASE_ANON_KEY__ ? window.__SUPABASE_ANON_KEY__ : 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0enNzenV0ZXl1dW1zcHl6c2FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUzOTM3MTYsImV4cCI6MjA2MDk2OTcxNn0.Jz3MmPuJZ0J7YqG0QzPzMfRMhQJCpTGJfCFe6bVa2IM';

const supabase = {
  _headers: () => ({
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  }),
  from: (table) => ({
    select: async (cols='*') => {
      if (!SUPABASE_URL) return { data: [], error: null };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=${cols}&order=created_at.desc`, { headers: supabase._headers() });
      const data = await res.json();
      return { data: Array.isArray(data) ? data : [], error: res.ok ? null : data };
    },
    insert: async (rows) => {
      if (!SUPABASE_URL) return { data: null, error: { message: 'Supabase未設定' } };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...supabase._headers(), 'Prefer': 'return=representation' },
        body: JSON.stringify(Array.isArray(rows) ? rows : [rows]),
      });
      const data = await res.json();
      return { data, error: res.ok ? null : data };
    },
    update: async (id, values) => {
      if (!SUPABASE_URL) return { data: null, error: { message: 'Supabase未設定' } };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'PATCH',
        headers: { ...supabase._headers(), 'Prefer': 'return=representation' },
        body: JSON.stringify(values),
      });
      const data = await res.json();
      return { data, error: res.ok ? null : data };
    },
    delete: async (id) => {
      if (!SUPABASE_URL) return { data: null, error: null };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'DELETE',
        headers: supabase._headers(),
      });
      return { error: res.ok ? null : await res.json() };
    },
  }),
};

// ============================================================
// DESIGN TOKENS
// ============================================================
const C = {
  bg: "#0a0f0d",
  surface: "#111a15",
  card: "#162019",
  border: "#1e3326",
  accent: "#2ecc71",
  accentDim: "#1a7a40",
  accentGlow: "rgba(46,204,113,0.15)",
  text: "#e8f5ec",
  muted: "#7aa885",
  dim: "#4a7055",
  warning: "#f0a500",
  danger: "#e74c3c",
  info: "#3498db",
  gold: "#d4af37",
};

// ============================================================
// UTILITY COMPONENTS
// ============================================================
const Badge = ({ color = 'green', children }) => {
  const m = {
    green: { bg: 'rgba(46,204,113,0.15)', text: '#2ecc71', border: 'rgba(46,204,113,0.3)' },
    yellow: { bg: 'rgba(240,165,0,0.15)', text: '#f0a500', border: 'rgba(240,165,0,0.3)' },
    red: { bg: 'rgba(231,76,60,0.15)', text: '#e74c3c', border: 'rgba(231,76,60,0.3)' },
    blue: { bg: 'rgba(52,152,219,0.15)', text: '#3498db', border: 'rgba(52,152,219,0.3)' },
    gold: { bg: 'rgba(212,175,55,0.15)', text: '#d4af37', border: 'rgba(212,175,55,0.3)' },
  };
  const c = m[color] || m.green;
  return <span style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}`, padding: '2px 10px', borderRadius: 99, fontSize: 11, fontWeight: 700 }}>{children}</span>;
};

const Btn = ({ onClick, children, color = 'primary', small, style: s }) => {
  const styles = {
    primary: { bg: C.accent, text: '#0a0f0d' },
    danger: { bg: C.danger, text: '#fff' },
    ghost: { bg: 'transparent', text: C.muted, border: `1px solid ${C.border}` },
    secondary: { bg: C.surface, text: C.text, border: `1px solid ${C.border}` },
  };
  const st = styles[color] || styles.primary;
  return (
    <button onClick={onClick} style={{
      background: st.bg, color: st.text, border: st.border || 'none',
      padding: small ? '5px 12px' : '9px 18px',
      borderRadius: 8, fontWeight: 700, fontSize: small ? 12 : 13,
      cursor: 'pointer', fontFamily: 'inherit', ...s
    }}>{children}</button>
  );
};

const StatCard = ({ icon, label, value, sub, color = C.accent, onClick }) => (
  <div onClick={onClick} style={{
    background: C.card, border: `1px solid ${C.border}`, borderRadius: 12,
    padding: '18px 20px', cursor: onClick ? 'pointer' : 'default',

    <div style={{ fontSize: 20, marginBottom: 6 }}>{icon}</div>
    <div style={{ fontSize: 26, fontWeight: 800, color, fontFamily: 'monospace', letterSpacing: -1 }}>{value}</div>
    <div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>{label}</div>
    {sub && <div style={{ fontSize: 11, color: C.dim, marginTop: 2 }}>{sub}</div>}
  </div>
);

const SectionHeader = ({ title, sub, action }) => (
  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18 }}>
    <div>
      <h2 style={{ fontSize: 17, fontWeight: 800, color: C.text }}>{title}</h2>
      {sub && <div style={{ fontSize: 12, color: C.muted, marginTop: 3 }}>{sub}</div>}
    </div>
    {action}
  </div>
);

const Table = ({ cols, rows, emptyMsg = 'データなし' }) => (
  <div style={{ overflowX: 'auto' }}>
    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
      <thead>
        <tr style={{ borderBottom: `2px solid ${C.border}` }}>
          {cols.map(c => (
            <th key={c.key} style={{ padding: '9px 11px', textAlign: 'left', color: C.muted, fontWeight: 700, fontSize: 11, letterSpacing: 0.8, whiteSpace: 'nowrap' }}>{c.label}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.length === 0
          ? <tr><td colSpan={cols.length} style={{ padding: 24, textAlign: 'center', color: C.dim }}>{emptyMsg}</td></tr>
          : rows.map((row, ri) => (
            <tr key={ri} style={{ borderBottom: `1px solid ${C.border}` }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(46,204,113,0.04)'}
              onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              {cols.map(c => (
                <td key={c.key} style={{ padding: '10px 11px', color: C.text, whiteSpace: 'nowrap' }}>
                  {c.render ? c.render(row[c.key], row) : (row[c.key] ?? '—')}
                </td>
              ))}
            </tr>
          ))
        }
      </tbody>
    </table>
  </div>
);

const Modal = ({ title, onClose, children, wide }) => (
  <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: 24, width: '100%', maxWidth: wide ? 680 : 480, maxHeight: '90vh', overflowY: 'auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <h3 style={{ fontSize: 16, fontWeight: 800 }}>{title}</h3>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.muted, fontSize: 20, cursor: 'pointer' }}>✕</button>
      </div>
      {children}
    </div>
  </div>
);

const Field = ({ label, children }) => (
  <div style={{ marginBottom: 14 }}>
    <label style={{ display: 'block', fontSize: 12, color: C.muted, marginBottom: 5, fontWeight: 600 }}>{label}</label>
    {children}
  </div>
);

const Input = ({ value, onChange, type = 'text', placeholder, step }) => (
  <input type={type} value={value} onChange={onChange} placeholder={placeholder} step={step}
    style={{ width: '100%', background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: '9px 12px', color: C.text, fontSize: 14, outline: 'none' }} />
);

const Select = ({ value, onChange, children }) => (
  <select value={value} onChange={onChange}
    style={{ width: '100%', background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: '9px 12px', color: C.text, fontSize: 14, outline: 'none' }}>
    {children}
  </select>
);

const Textarea = ({ value, onChange, rows = 3, placeholder }) => (
  <textarea value={value} onChange={onChange} rows={rows} placeholder={placeholder}
    style={{ width: '100%', background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: '9px 12px', color: C.text, fontSize: 14, outline: 'none', resize: 'vertical' }} />
);

const Card = ({ children, style: s }) => (
  <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, ...s }}>{children}</div>
);

const Toast = ({ msg, type = 'success' }) => msg ? (
  <div style={{
    position: 'fixed', bottom: 80, left: '50%', transform: 'translateX(-50%)',
    background: type === 'error' ? C.danger : C.accent, color: '#0a0f0d',
    padding: '10px 24px', borderRadius: 99, fontWeight: 700, fontSize: 14, zIndex: 2000,
    boxShadow: '0 4px 20px rgba(0,0,0,0.4)'
  }}>{msg}</div>
) : null;

const today = () => new Date().toISOString().slice(0, 10);
const fmt = (n) => n != null ? Number(n).toLocaleString() : '—';
const fmtDate = (d) => d ? d.slice(0, 10) : '—';

// ============================================================

  ],

// ============================================================
// DASHBOARD
// ============================================================
const Dashboard = ({ pools, shipping, deaths, stock_in, finance, setPage }) => {
  const totalStock = pools.reduce((s, p) => s + (p.current || 0), 0);
  const totalWeight = pools.reduce((s, p) => s + (p.weight || 0), 0);
  const warningPools = pools.filter(p => p.status === 'warning').length;
  const thisMonthIncome = finance.filter(f => f.type === 'income' && f.date?.slice(0,7) === today().slice(0,7)).reduce((s,f)=>s+(f.amount||0),0);
  const thisMonthExpense = finance.filter(f => f.type === 'expense' && f.date?.slice(0,7) === today().slice(0,7)).reduce((s,f)=>s+(f.amount||0),0);

  return (
    <div>
      <SectionHeader title="ダッシュボード" sub={`${today()} 現在`} />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(160px,1fr))', gap: 12, marginBottom: 24 }}>
        <StatCard icon="🐟" label="総在鰻数" value={fmt(totalStock)+'尾'} sub={`${fmt(totalWeight)}kg`} onClick={() => setPage('stock')} />
        <StatCard icon="🏊" label="管理池数" value={pools.length+'池'} sub={warningPools > 0 ? `⚠️ 要注意${warningPools}池` : '全池正常'} color={warningPools > 0 ? C.warning : C.accent} onClick={() => setPage('stock')} />
        <StatCard icon="📦" label="今月出荷" value={shipping.filter(s=>s.date?.slice(0,7)===today().slice(0,7)).length+'件'} sub={fmt(shipping.filter(s=>s.date?.slice(0,7)===today().slice(0,7)).reduce((a,s)=>a+(s.kg||0),0))+'kg'} onClick={() => setPage('shipping')} />
        <StatCard icon="💴" label="今月売上" value={'¥'+fmt(thisMonthIncome)} sub={`支出 ¥${fmt(thisMonthExpense)}`} color={C.gold} onClick={() => setPage('finance')} />
        <StatCard icon="📉" label="今月死魚" value={deaths.filter(d=>d.date?.slice(0,7)===today().slice(0,7)).reduce((s,d)=>s+(d.count||0),0)+'尾'} color={C.danger} onClick={() => setPage('deaths')} />
        <StatCard icon="🌾" label="直近入荷" value={stock_in.length > 0 ? fmtDate(stock_in[0].date) : '—'} sub={stock_in.length > 0 ? stock_in[0].supplier : ''} onClick={() => setPage('stock')} />
      </div>

      <SectionHeader title="池別状況" />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(220px,1fr))', gap: 12, marginBottom: 24 }}>
        {pools.map(p => {
          const pct = Math.round((p.current / p.capacity) * 100);
          const color = p.status === 'warning' ? C.warning : C.accent;
          return (
            <Card key={p.id}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
                <span style={{ fontWeight: 700 }}>{p.name}</span>
                <Badge color={p.status === 'warning' ? 'yellow' : 'green'}>{p.status === 'warning' ? '要注意' : '正常'}</Badge>
              </div>
              <div style={{ fontSize: 22, fontWeight: 800, color, fontFamily: 'monospace' }}>{fmt(p.current)}<span style={{ fontSize: 13, color: C.muted }}>尾</span></div>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 4 }}>{fmt(p.weight)}kg / 容量{fmt(p.capacity)}尾</div>
              <div style={{ marginTop: 10, height: 4, background: C.border, borderRadius: 2 }}>
                <div style={{ height: 4, background: color, borderRadius: 2, width: `${Math.min(pct, 100)}%` }} />
              </div>
              <div style={{ fontSize: 11, color: C.dim, marginTop: 4 }}>{pct}%</div>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

// ============================================================
// 池入れ・在鰻管理
// ============================================================
const StockPage = ({ pools, setPools, stock_in, setStockIn, useMock }) => {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ date: today(), supplier: '', pool_id: pools[0]?.id || '', lot: '', qty: '', kg: '', avg_size: '', staff: '' });
  const [toast, setToast] = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const save = async () => {
    const row = { ...form, qty: Number(form.qty), kg: Number(form.kg) };
    if (useMock) {
      setStockIn(prev => [{ ...row, id: 'SI' + Date.now() }, ...prev]);
    } else {
      const { error } = await supabase.from('erp_stock_in').insert(row);
      if (error) { showToast('❌ 保存失敗'); return; }
      const { data } = await supabase.from('erp_stock_in').select();
      setStockIn(data);
    }
    showToast('✅ 保存しました');
    setShowModal(false);
  };

  return (
    <div>
      <Toast msg={toast} />
      <SectionHeader title="池入れ・在鰻管理" sub="池別在鰻数・入荷記録"
        action={<Btn onClick={() => setShowModal(true)}>＋ 新規入荷</Btn>} />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(200px,1fr))', gap: 12, marginBottom: 24 }}>
        {pools.map(p => {
          const pct = Math.round((p.current / p.capacity) * 100);
          return (
            <Card key={p.id}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                <Badge color={p.status === 'warning' ? 'yellow' : 'green'}>{p.status === 'warning' ? '要注意' : '正常'}</Badge>
              </div>
              <div style={{ fontSize: 24, fontWeight: 800, color: C.accent, fontFamily: 'monospace' }}>{fmt(p.current)}<span style={{ fontSize: 12, color: C.muted }}>尾</span></div>
              <div style={{ fontSize: 12, color: C.muted }}>{fmt(p.weight)}kg</div>
              <div style={{ marginTop: 8, height: 4, background: C.border, borderRadius: 2 }}>
                <div style={{ height: 4, background: pct > 90 ? C.danger : C.accent, borderRadius: 2, width: `${Math.min(pct,100)}%` }} />
              </div>
              <div style={{ fontSize: 11, color: C.dim, marginTop: 3 }}>収容率 {pct}%</div>
            </Card>
          );
        })}
      </div>

      <SectionHeader title="入荷記録" />
      <Card>
        <Table cols={[
          { key: 'date', label: '日付' },
          { key: 'supplier', label: '仕入先' },
          { key: 'pool_id', label: '池', render: v => pools.find(p=>p.id===v)?.name || v },
          { key: 'lot', label: 'ロット' },
          { key: 'qty', label: '尾数', render: v => fmt(v)+'尾' },
          { key: 'kg', label: 'kg', render: v => fmt(v)+'kg' },
          { key: 'avg_size', label: '平均サイズ' },
          { key: 'staff', label: '担当' },
        ]} rows={stock_in} emptyMsg="入荷記録なし" />
      </Card>

      {showModal && (

const MedicinePage = ({ pools, medicines, setMedicines, useMock }) => {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ name: '', pool_id: pools[0]?.id || '', use_date: today(), amount: '', purpose: '', withdraw_days: '', clear_date: '', staff: '', memo: '' });
  const [toast, setToast] = useState('');
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2500); };

  const calcClearDate = (useDate, days) => {
    if (!useDate || !days) return '';
    const d = new Date(useDate);
    d.setDate(d.getDate() + Number(days));
    return d.toISOString().slice(0, 10);
  };

  const save = async () => {
    const row = { ...form, withdraw_days: Number(form.withdraw_days), status: 'active',
      clear_date: calcClearDate(form.use_date, form.withdraw_days) };
    if (useMock) {
      setMedicines(prev => [{ ...row, id: 'M' + Date.now() }, ...prev]);
    } else {
      const { error } = await supabase.from('erp_medicines').insert(row);
      if (error) { showToast('❌ 保存失敗'); return; }
      const { data } = await supabase.from('erp_medicines').select();
      setMedicines(data);
    }
    showToast('✅ 保存しました');
    setShowModal(false);
  };

  const active = medicines.filter(m => m.status === 'active');
  const cleared = medicines.filter(m => m.status === 'cleared');

  return (

                <div style={{ fontSize: 12, color: C.muted }}>{pools.find(p=>p.id===m.pool_id)?.name} / {m.purpose}</div>
                <div style={{ fontSize: 12, color: C.warning, marginTop: 6 }}>休薬満了: {fmtDate(m.clear_date)}</div>
              </Card>
            ))}
          </div>
        </div>
      )}

      <Card>
        <Table cols={[
          { key: 'use_date', label: '投薬日' },

        <div style={{ padding: '12px 16px', background: 'rgba(52,152,219,0.1)', border: `1px solid rgba(52,152,219,0.3)`, borderRadius: 8, marginBottom: 16 }}>
          <div style={{ fontSize: 12, color: C.info, fontWeight: 700, marginBottom: 4 }}>💡 未設定の場合</div>
          <div style={{ fontSize: 12, color: C.muted }}>Supabaseを設定しない場合はモックデータで動作します。データはページをリロードするとリセットされます。</div>
        </div>
        <Btn onClick={save}>保存してリロード</Btn>
      </Card>
    </div>
  );
};

// ============================================================
// NAVIGATION
// ============================================================
const NAV = [
  { id: 'dashboard', label: 'ダッシュボード', icon: '📊' },
  { id: 'stock', label: '池入れ・在鰻', icon: '🐟' },
  { id: 'shipping', label: '出荷管理', icon: '📦' },
  { id: 'feeding', label: '給餌管理', icon: '🌾' },
  { id: 'processing', label: '加工管理', icon: '🏭' },
  { id: 'water', label: '水質管理', icon: '💧' },
  { id: 'deaths', label: '死魚管理', icon: '📉' },
  { id: 'medicine', label: '薬品管理', icon: '💊' },
  { id: 'haccp', label: 'HACCP', icon: '✅' },
  { id: 'finance', label: '財務管理', icon: '💴' },
  { id: 'permit', label: '許可枠', icon: '📋' },
  { id: 'subsidy', label: '補助金', icon: '🏛' },
  { id: 'audit', label: '監査対応', icon: '🔍' },
  { id: 'settings', label: '設定', icon: '⚙️' },
];

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [page, setPage] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [useMock, setUseMock] = useState(true);

  // Supabase設定
  const [supabaseUrl, setSupabaseUrl] = useState(localStorage.getItem('erp_supabase_url') || '');
  const [supabaseKey, setSupabaseKey] = useState(localStorage.getItem('erp_supabase_key') || '');

  // データ
  const [pools, setPools] = useState(MOCK.pools);
  const [stockIn, setStockIn] = useState(MOCK.stock_in);
  const [shipping, setShipping] = useState(MOCK.shipping);
  const [feeding, setFeeding] = useState(MOCK.feeding);
  const [water, setWater] = useState(MOCK.water);
  const [deaths, setDeaths] = useState(MOCK.deaths);
  const [medicines, setMedicines] = useState(MOCK.medicines);
  const [processing, setProcessing] = useState(MOCK.processing);
  const [haccp, setHaccp] = useState(MOCK.haccp);
  const [finance, setFinance] = useState(MOCK.finance);
  const [subsidies, setSubsidies] = useState(MOCK.subsidies);
  const [permit, setPermit] = useState(MOCK.permit);

  useEffect(() => {
    const savedUrl = localStorage.getItem('erp_supabase_url') || 'https://xmzsszuteyuumspyzsaq.supabase.co';
    const savedKey = localStorage.getItem('erp_supabase_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0enNzenV0ZXl1dW1zcHl6c2FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUzOTM3MTYsImV4cCI6MjA2MDk2OTcxNn0.Jz3MmPuJZ0J7YqG0QzPzMfRMhQJCpTGJfCFe6bVa2IM';
    if (savedUrl && savedKey) {
      window.__SUPABASE_URL__ = savedUrl;
      window.__SUPABASE_ANON_KEY__ = savedKey;
      loadFromSupabase();
    } else {
      setLoading(false);
    }
  }, []);

  const loadFromSupabase = async () => {
    try {
      const tables = ['erp_pools','erp_stock_in','erp_shipping','erp_feeding','erp_water_quality','erp_deaths','erp_medicines','erp_processing','erp_haccp','erp_finance','erp_subsidies','erp_permit'];
      const setters = [setPools, setStockIn, setShipping, setFeeding, setWater, setDeaths, setMedicines, setProcessing, setHaccp, setFinance, setSubsidies, setPermit];
      const mocks = [MOCK.pools, MOCK.stock_in, MOCK.shipping, MOCK.feeding, MOCK.water, MOCK.deaths, MOCK.medicines, MOCK.processing, MOCK.haccp, MOCK.finance, MOCK.subsidies, MOCK.permit];
      const results = await Promise.all(tables.map(t => supabase.from(t).select()));
      let anyData = false;
      results.forEach(({ data }, i) => {
        if (data && data.length > 0) { setters[i](data); anyData = true; }
        else { setters[i](mocks[i]); }
      });
      setUseMock(!anyData);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  if (loading) return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', flexDirection: 'column', gap: 16 }}>
      <div style={{ fontSize: 32 }}>🐟</div>
      <div style={{ color: C.muted }}>花立山養鰻 ERPシステム 起動中...</div>
    </div>
  );

  const renderPage = () => {
    const props = { pools, useMock };
    switch(page) {
      case 'dashboard': return <Dashboard pools={pools} shipping={shipping} deaths={deaths} stock_in={stockIn} finance={finance} setPage={setPage} />;
      case 'stock': return <StockPage {...props} setPools={setPools} stock_in={stockIn} setStockIn={setStockIn} />;
      case 'shipping': return <ShippingPage {...props} shipping={shipping} setShipping={setShipping} />;
      case 'feeding': return <FeedingPage {...props} feeding={feeding} setFeeding={setFeeding} />;
      case 'processing': return <ProcessingPage processing={processing} setProcessing={setProcessing} useMock={useMock} />;
      case 'water': return <WaterPage {...props} water={water} setWater={setWater} />;
      case 'deaths': return <DeathPage {...props} deaths={deaths} setDeaths={setDeaths} />;
      case 'medicine': return <MedicinePage {...props} medicines={medicines} setMedicines={setMedicines} />;
      case 'haccp': return <HACCPPage haccp={haccp} setHaccp={setHaccp} useMock={useMock} />;
      case 'finance': return <FinancePage finance={finance} setFinance={setFinance} useMock={useMock} />;
      case 'permit': return <PermitPage permit={permit} pools={pools} />;
      case 'subsidy': return <SubsidyPage subsidies={subsidies} setSubsidies={setSubsidies} useMock={useMock} />;
      case 'audit': return <AuditPage pools={pools} stock_in={stockIn} shipping={shipping} deaths={deaths} water={water} medicines={medicines} haccp={haccp} finance={finance} />;
      case 'settings': return <SettingsPage supabaseUrl={supabaseUrl} setSupabaseUrl={setSupabaseUrl} supabaseKey={supabaseKey} setSupabaseKey={setSupabaseKey} onSave={(url,key)=>{ window.__SUPABASE_URL__=url; window.__SUPABASE_ANON_KEY__=key; }} />;
      default: return null;
    }
  };

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      {/* サイドバー */}
      <div className="sidebar" style={{ width: 200, background: C.surface, borderRight: `1px solid ${C.border}`, position: 'fixed', top: 0, left: 0, height: '100vh', overflowY: 'auto', zIndex: 100 }}>
        <div style={{ padding: '20px 16px 12px', borderBottom: `1px solid ${C.border}` }}>
          <div style={{ fontSize: 11, color: C.accent, fontWeight: 800, letterSpacing: 1 }}>花立山養鰻</div>
          <div style={{ fontSize: 10, color: C.dim, marginTop: 2 }}>統合ERPシステム v2</div>
          {useMock && <div style={{ fontSize: 10, color: C.warning, marginTop: 4 }}>⚠️ モードデータ使用中</div>}
        </div>
        <nav style={{ padding: '8px 0' }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => setPage(n.id)} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 10,
              padding: '10px 16px', background: page === n.id ? C.accentGlow : 'none',
              border: 'none', borderLeft: page === n.id ? `3px solid ${C.accent}` : '3px solid transparent',
              color: page === n.id ? C.accent : C.muted, fontSize: 13, fontWeight: page === n.id ? 700 : 400,
              cursor: 'pointer', textAlign: 'left', fontFamily: 'inherit',
            }}>
              <span>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>

      {/* メインコンテンツ */}
      <div className="main-content" style={{ marginLeft: 200, flex: 1, padding: '24px 24px 80px', maxWidth: '100%' }}>
        {renderPage()}
      </div>

      {/* モバイルナビ */}
      <div className="mobile-nav">
        {NAV.map(n => (
          <button key={n.id} className={page === n.id ? 'active' : ''} onClick={() => setPage(n.id)}>
            <span style={{ fontSize: 18 }}>{n.icon}</span>
            <span>{n.label.length > 4 ? n.label.slice(0,4) : n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
